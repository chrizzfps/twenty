name: Auto-Triage Issues

on:
  issues:
    types: [opened]

jobs:
  triage:
    # Skip if issue mentions @claude (handled by claude.yml)
    if: |
      !contains(github.event.issue.title, '@claude') &&
      !contains(github.event.issue.body || '', '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repo context for triage
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch recent open issues for duplicate detection (titles + bodies for better matching)
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
              sort: 'created',
              direction: 'desc',
            });

            const issueList = issues.data
              .filter(i => i.number !== context.payload.issue.number && !i.pull_request)
              .map(i => {
                const body = (i.body || '').substring(0, 200).replace(/\n/g, ' ');
                return `#${i.number}: ${i.title} — ${body}`;
              })
              .join('\n');

            core.setOutput('open_issues', issueList);

            // Fetch available issue types via GraphQL
            try {
              const result = await github.graphql(`
                {
                  repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                    issueTypes(first: 20) {
                      nodes {
                        id
                        name
                        description
                      }
                    }
                  }
                }
              `, {
                headers: { 'GraphQL-Features': 'issue_types' }
              });
              const types = result.repository.issueTypes.nodes;
              core.setOutput('issue_types', JSON.stringify(types));
            } catch (e) {
              console.log('Could not fetch issue types:', e.message);
              core.setOutput('issue_types', '[]');
            }

      - name: Triage issue with Claude
        id: triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            You are a knowledgeable first responder for Twenty, an open-source CRM.
            You have READ-ONLY access to the full codebase. Your job is to understand the issue,
            search the code for relevant context, and provide a genuinely helpful response.

            ## Issue to analyze

            Issue #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}
            Body:
            ${{ github.event.issue.body }}

            Available issue types: ${{ steps.context.outputs.issue_types }}

            Recent open issues (for duplicate check):
            ${{ steps.context.outputs.open_issues }}

            ## Your task

            1. SEARCH the codebase for relevant code:
               - For bug reports: grep for error messages, component names, API endpoints, or function names mentioned
               - For questions: search for the feature or concept they're asking about
               - For features: check if related functionality already exists
               - Read the relevant source files to understand the current implementation

            2. CLASSIFY the issue:
               - issue_type: "Bug" (broken behavior with evidence), "Feature" (new capability/enhancement), "Task" (refactoring/docs/internal), or null
               - scope: "front" (React/UI), "backend" (NestJS/API/DB), "back+front" (both), "infra" (CI/CD/deploy), "self-host" (Docker/self-hosted), or null
               - is_support_question: true if asking "how do I..." or troubleshooting
               - is_feature_suggestion: true if proposing new functionality
               - needs_reproduction: true for bugs that lack clear reproduction steps
               - good_first_issue: true only if the fix is clearly straightforward and well-scoped
               - duplicate_of: issue number ONLY if clearly the same problem (not just related)

            3. WRITE a helpful comment:
               - If you found relevant code, share the file path(s) and explain what you see
               - For bugs: try to identify the relevant code area or possible root cause
               - For questions: try to answer from what you find in the codebase
               - For features: mention existing related functionality and where it lives
               - Be concise but substantive — a few sentences with code pointers beats a wall of text
               - If you genuinely can't find anything relevant, keep it brief
               - DO NOT suggest priority, timeline, or size estimates — that's for maintainers
               - DO NOT promise fixes or assign responsibility

            ## Output format

            After your research, output ONLY a JSON object with no markdown fencing:

            {
              "issue_type": "<Bug|Feature|Task|null>",
              "scope": "<front|backend|back+front|infra|self-host|null>",
              "is_support_question": <boolean>,
              "is_feature_suggestion": <boolean>,
              "good_first_issue": <boolean>,
              "needs_reproduction": <boolean>,
              "duplicate_of": <number or null>,
              "comment": "<your helpful markdown response>"
            }
          claude_args: '--max-turns 10 --model sonnet --allowedTools "Glob,Grep,Read"'

      - name: Apply triage results
        if: steps.triage.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            let triage;
            try {
              const raw = `${{ steps.triage.outputs.result }}`;
              const jsonMatch = raw.match(/\{[\s\S]*\}/);
              if (!jsonMatch) {
                console.log('No JSON found in Claude response:', raw);
                return;
              }
              triage = JSON.parse(jsonMatch[0]);
            } catch (e) {
              console.log('Failed to parse triage response:', e.message);
              return;
            }

            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Set issue type via GraphQL
            if (triage.issue_type) {
              try {
                const issueTypes = JSON.parse(`${{ steps.context.outputs.issue_types }}`);
                const matchedType = issueTypes.find(t => t.name === triage.issue_type);
                if (matchedType) {
                  const issueData = await github.graphql(`
                    {
                      repository(owner: "${owner}", name: "${repo}") {
                        issue(number: ${issueNumber}) {
                          id
                        }
                      }
                    }
                  `);
                  const issueNodeId = issueData.repository.issue.id;

                  await github.graphql(`
                    mutation {
                      updateIssue(input: {
                        id: "${issueNodeId}",
                        issueTypeId: "${matchedType.id}"
                      }) {
                        issue { number }
                      }
                    }
                  `, {
                    headers: { 'GraphQL-Features': 'issue_types' }
                  });
                  console.log(`Set issue type to: ${triage.issue_type}`);
                }
              } catch (e) {
                console.log(`Could not set issue type: ${e.message}`);
              }
            }

            // 2. Build label list
            const labels = [];

            const validScopes = ['front', 'backend', 'back+front', 'infra', 'self-host'];
            if (triage.scope && validScopes.includes(triage.scope)) {
              labels.push(triage.scope === 'self-host' ? 'scope: self-host' : `scope: ${triage.scope}`);
            }

            if (triage.good_first_issue === true) {
              labels.push('good first issue');
            }

            if (triage.needs_reproduction === true) {
              labels.push('needs: reproduction');
            }

            if (triage.is_support_question === true) {
              labels.push('support');
            }

            // 3. Ensure labels exist and apply them
            if (labels.length > 0) {
              const existingLabels = await github.rest.issues.listLabelsForRepo({
                owner, repo, per_page: 100,
              });
              const existingLabelNames = new Set(existingLabels.data.map(l => l.name));

              const labelColors = {
                'needs: reproduction': 'fbca04',
                'support': '0075ca',
                'scope: self-host': 'bfd4f2',
              };

              for (const label of labels) {
                if (!existingLabelNames.has(label)) {
                  try {
                    await github.rest.issues.createLabel({
                      owner, repo,
                      name: label,
                      color: labelColors[label] || 'ededed',
                    });
                  } catch (e) {
                    console.log(`Could not create label "${label}": ${e.message}`);
                  }
                }
              }

              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issueNumber,
                labels,
              });
              console.log(`Applied labels: ${labels.join(', ')}`);
            }

            // 4. Build and post comment
            const commentParts = [];

            // Claude's substantive response (the main value)
            if (triage.comment) {
              commentParts.push(triage.comment);
            }

            // Flag duplicates
            if (triage.duplicate_of && Number.isInteger(triage.duplicate_of)) {
              commentParts.push(`\n> **Possible duplicate** of #${triage.duplicate_of} — please check if this is the same issue.`);
            }

            // Guide support questions
            if (triage.is_support_question === true) {
              commentParts.push(`\n---\nFor faster help, you can also try our [Discord](https://discord.gg/cx5n7CSns2) or [GitHub Discussions](https://github.com/twentyhq/twenty/discussions). If this is a confirmed bug, please update the issue with reproduction steps and we'll re-triage.`);
            }

            // Guide feature suggestions
            if (triage.is_feature_suggestion === true && triage.issue_type !== 'Bug') {
              commentParts.push(`\n---\nFeature requests are often discussed in [GitHub Discussions](https://github.com/twentyhq/twenty/discussions) before becoming tracked issues. A maintainer may move this there.`);
            }

            // Reproduction needed
            if (triage.needs_reproduction === true && !triage.is_support_question) {
              commentParts.push(`\n---\nTo help us investigate, please provide:\n- Steps to reproduce\n- Expected vs actual behavior\n- Environment details (self-hosted/cloud, version, browser)`);
            }

            if (commentParts.length > 0) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNumber,
                body: commentParts.join('\n'),
              });
            }
